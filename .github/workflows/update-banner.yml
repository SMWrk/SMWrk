name: Update Profile Banner

on:
  schedule:
    # Runs daily at 09:00 UTC — adjust to taste
    - cron: "0 9 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/generate_banner.py"

permissions:
  contents: write

jobs:
  update-banner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no marketplace action)
        env:
          GH_TOKEN_FOR_CLONE: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" \
            "https://x-access-token:${GH_TOKEN_FOR_CLONE}@github.com/${GITHUB_REPOSITORY}.git" .

      # ubuntu-latest ships with python3 preinstalled — no setup-python action needed.
      - name: Verify Python
        run: python3 --version

      - name: Generate banner SVG
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_banner.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- assets/banner.svg; then
            git add assets/banner.svg
            git commit -m "chore: refresh profile banner [automated]"
            git push
          else
            echo "No changes to banner.svg — skipping commit."
          fi
