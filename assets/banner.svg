<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="100%" stop-color="#1a0b2e"/>
    </linearGradient>

    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00e6">
        <animate attributeName="stop-color"
          values="#ff00e6;#00f0ff;#7000ff;#ff00e6"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00f0ff">
        <animate attributeName="stop-color"
          values="#00f0ff;#7000ff;#ff00e6;#00f0ff"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7000ff">
        <animate attributeName="stop-color"
          values="#7000ff;#ff00e6;#00f0ff;#7000ff"
          dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    
      <clipPath id="clip0">
        <rect x="60" width="0" height="48" y="130">
          <animate attributeName="width" from="0" to="270.0"
                   begin="loop.begin+0.000s" dur="0.825s"
                   fill="freeze" calcMode="linear"/>
          <animate attributeName="width" from="270.0" to="0"
                   begin="loop.begin+2.225s" dur="0.480s"
                   fill="freeze" calcMode="linear"/>
        </rect>
      </clipPath>

      <clipPath id="clip1">
        <rect x="60" width="0" height="48" y="130">
          <animate attributeName="width" from="0" to="954.0"
                   begin="loop.begin+3.005s" dur="2.915s"
                   fill="freeze" calcMode="linear"/>
          <animate attributeName="width" from="954.0" to="0"
                   begin="loop.begin+7.320s" dur="1.696s"
                   fill="freeze" calcMode="linear"/>
        </rect>
      </clipPath>

      <clipPath id="clip2">
        <rect x="60" width="0" height="48" y="130">
          <animate attributeName="width" from="0" to="594.0"
                   begin="loop.begin+9.316s" dur="1.815s"
                   fill="freeze" calcMode="linear"/>
          <animate attributeName="width" from="594.0" to="0"
                   begin="loop.begin+12.531s" dur="1.056s"
                   fill="freeze" calcMode="linear"/>
        </rect>
      </clipPath>

      <clipPath id="clip3">
        <rect x="60" width="0" height="48" y="130">
          <animate attributeName="width" from="0" to="1026.0"
                   begin="loop.begin+13.887s" dur="3.135s"
                   fill="freeze" calcMode="linear"/>
          <animate attributeName="width" from="1026.0" to="0"
                   begin="loop.begin+18.422s" dur="1.824s"
                   fill="freeze" calcMode="linear"/>
        </rect>
      </clipPath>

      <clipPath id="clip4">
        <rect x="60" width="0" height="48" y="130">
          <animate attributeName="width" from="0" to="666.0"
                   begin="loop.begin+20.546s" dur="2.035s"
                   fill="freeze" calcMode="linear"/>
          <animate attributeName="width" from="666.0" to="0"
                   begin="loop.begin+23.981s" dur="1.184s"
                   fill="freeze" calcMode="linear"/>
        </rect>
      </clipPath>

    <style>
      .typed {
        font-family: 'Fira Code', 'JetBrains Mono', Consolas, monospace;
        font-size: 30px;
        fill: #f5f5ff;
        filter: url(#glow);
        dominant-baseline: middle;
      }
      .prompt {
        font-family: 'Fira Code', 'JetBrains Mono', Consolas, monospace;
        font-size: 30px;
        fill: #00f0ff;
        filter: url(#glow);
      }
      .stats {
        font-family: 'Fira Code', 'JetBrains Mono', Consolas, monospace;
        font-size: 13px;
        fill: #a89bd8;
        letter-spacing: 0.5px;
      }
      .cursor {
        fill: #00f0ff;
        filter: url(#glow);
      }
    </style>
  </defs>

  <!-- invisible master clock all animations sync to; this is what makes the whole banner loop -->
  <rect x="0" y="0" width="1" height="1" opacity="0">
    <animate id="loop" attributeName="opacity" from="0" to="0" dur="25.465s" begin="0s;loop.end" repeatCount="indefinite"/>
  </rect>

  <rect x="0" y="0" width="1200" height="300" rx="18" fill="url(#bgGrad)"/>

  <!-- animated border glow -->
  <rect x="2" y="2" width="1196" height="296" rx="16" fill="none"
        stroke="url(#neonGrad)" stroke-width="2.5" filter="url(#softGlow)" opacity="0.9"/>
  <rect x="2" y="2" width="1196" height="296" rx="16" fill="none"
        stroke="url(#neonGrad)" stroke-width="1.5"/>

  <!-- floating glow particles -->
  <circle cx="1110" cy="50" r="46" fill="#ff00e6" opacity="0.12" filter="url(#softGlow)">
    <animate attributeName="cy" values="50;70;50" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1020" cy="150" r="60" fill="#00f0ff" opacity="0.10" filter="url(#softGlow)">
    <animate attributeName="cy" values="150;120;150" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1160" cy="170" r="30" fill="#7000ff" opacity="0.14" filter="url(#softGlow)">
    <animate attributeName="cx" values="1160;1130;1160" dur="8s" repeatCount="indefinite"/>
  </circle>

  <text x="18" y="160.5" class="prompt">&gt;</text>
      <g clip-path="url(#clip0)"><text x="60" y="160.5" class="typed">Hi, I'm Seth 👋 </text></g>
      <g clip-path="url(#clip1)"><text x="60" y="160.5" class="typed">I'm a Web Specialist based out of the North Shore, US</text></g>
      <g clip-path="url(#clip2)"><text x="60" y="160.5" class="typed">Git-based version control, always</text></g>
      <g clip-path="url(#clip3)"><text x="60" y="160.5" class="typed">Currently: taming modular, CRM-native Quality Control App</text></g>
      <g clip-path="url(#clip4)"><text x="60" y="160.5" class="typed">Exploring new and exciting technology</text></g>
  <rect x="40" y="130.5" width="16.5" height="36.0" class="cursor" opacity="0">
    <animate attributeName="x" attributeType="XML"
      values="330.0; 1014.0; 654.0; 1086.0; 726.0"
      dur="25.465s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"
      keyTimes="0.0000; 0.1180; 0.3658; 0.5453; 0.8068"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="25.465s" begin="loop.begin" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="1;0;1" dur="0.9s" begin="loop.begin" repeatCount="indefinite"/>
  </rect>

  <text x="1180" y="282" text-anchor="end" class="stats">★ 0 stars  ·  1 repos  ·  0 followers  ·  last updated 2026-07-01 UTC</text>
</svg>
